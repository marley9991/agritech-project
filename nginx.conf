# ─────────────────────────────────────────────────────────────────────────────
# AgriConnect — Nginx Configuration
# Serves static frontend + reverse-proxies /api/* to Express backend
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name agriconnect.gh www.agriconnect.gh;

    # Redirect HTTP → HTTPS in production
    # Comment out if using HTTP for demo/local
    # return 301 https://$host$request_uri;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # ── Gzip compression ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/html text/css application/javascript application/json;

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy       "no-referrer"  always;

    # ── Static assets caching ───────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # ── API reverse proxy ────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade     $http_upgrade;
        proxy_set_header   Connection  "upgrade";
        proxy_set_header   Host        $host;
        proxy_set_header   X-Real-IP   $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;

        # CORS headers for demo/mobile access
        add_header Access-Control-Allow-Origin  "*"                           always;
        add_header Access-Control-Allow-Methods "GET,POST,PATCH,PUT,DELETE"   always;
        add_header Access-Control-Allow-Headers "Content-Type,Authorization"  always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # ── SPA fallback — all routes serve index.html ───────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}

